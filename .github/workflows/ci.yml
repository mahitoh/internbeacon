name: CI

on:
  # Run quality checks on pull requests targeting main.
  pull_request:
    branches: [main]

  # Also run checks on direct pushes to main.
  push:
    branches: [main]

jobs:
  checks:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest

    steps:
      # 1) Fetch repository code.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Install Node runtime and enable npm cache.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3) Install lockfile-based dependencies for reproducible CI.
      - name: Install dependencies
        run: npm ci

      # 4) Run linting across all workspaces.
      - name: Lint
        run: npm run lint

      # 5) Run static type checks across all workspaces.
      - name: Typecheck
        run: npm run typecheck

      # 6) Run test suites across all workspaces.
      - name: Test
        run: npm run test
